name: Publish Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3 or v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      plain: ${{ steps.version.outputs.plain }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize version
        id: version
        run: |
          RAW="${{ inputs.version }}"
          VERSION="${RAW#v}"
          echo "plain=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update package.json version
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.plain }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: pnpm install

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"
          git push
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-dist
          path: .
          retention-days: 1

  sync-develop:
    # Pushes made with GITHUB_TOKEN don't trigger the sync-develop workflow,
    # so fast-forward develop to main here once the release commit lands.
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: |
          git fetch origin main
          git fetch origin develop

      - name: Check if develop branch exists
        id: check-develop
        run: |
          if git show-ref --verify --quiet refs/remotes/origin/develop; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ develop branch exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ develop branch does not exist"
          fi

      - name: Create develop branch if it doesn't exist
        if: steps.check-develop.outputs.exists == 'false'
        run: |
          echo "🔧 Creating develop branch from main..."
          git checkout -b develop
          git push origin develop
          echo "✅ develop branch created and pushed"

      - name: Sync develop with main
        if: steps.check-develop.outputs.exists == 'true'
        run: |
          echo "🔄 Syncing develop branch with main..."
          git checkout develop

          DEVELOP_BEFORE=$(git rev-parse HEAD)
          MAIN_COMMIT=$(git rev-parse origin/main)
          echo "📋 develop branch before sync: $DEVELOP_BEFORE"
          echo "📋 main branch commit: $MAIN_COMMIT"

          if [ "$DEVELOP_BEFORE" = "$MAIN_COMMIT" ]; then
            echo "✅ develop branch is already up to date with main"
            exit 0
          fi

          echo "🚀 Attempting fast-forward merge..."
          if git merge --ff-only origin/main; then
            echo "✅ Fast-forward merge successful"
            git push origin develop
            echo "🎉 develop branch successfully synced with main"
          else
            echo "⚠️ Fast-forward merge failed — develop has commits that are not in main"
            DIVERGED_COMMITS=$(git rev-list --count origin/main..develop)
            echo "📊 Number of commits in develop not in main: $DIVERGED_COMMITS"
            echo "📋 Diverged commits:"
            git log --oneline origin/main..develop
            echo "💡 Consider creating a pull request to merge develop into main first"
            exit 1
          fi

  publish-gpr:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: package-dist

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"
          scope: "@markuxt"

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: package-dist

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@markuxt"

      - name: Publish to npm
        run: npm publish --access public --provenance
