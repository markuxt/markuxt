services:
  web:
    image: nginx:alpine
    container_name: markuxt-demo
    ports:
      - "8080:80"
    volumes:
      # Static output generated by `pnpm --filter ./demo generate`
      - ./.output/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
