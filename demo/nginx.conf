server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Issue relative redirects so the mapped host port is preserved
    # (otherwise nginx redirects to :80 behind the container's :8080 mapping).
    absolute_redirect off;

    # Gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        # Prerendered routes first, then fall back to the SPA shell (200.html).
        try_files $uri $uri/ $uri.html /200.html;
    }

    # Nuxt's custom 404 page
    error_page 404 /404.html;
}
